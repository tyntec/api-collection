openapi: 3.0.3
info:
  title: "Network Signals API"
  description: |
    This is the OpenAPI specification for the Network Signals product.
    
    The Network Signals API provides services to verify and check information about phone numbers, including:
    
    - SIM swap detection and date retrieval
    - Device swap detection and date retrieval
    - Call forwarding status check
  version: '1.0.0'
  contact:
    name: tyntec API Support
    url: https://www.tyntec.com/support
    email: support@tyntec.com
  x-repository: https://github.com/tyntec/api-collection/blob/master/network-signals
  x-specification-file: network-signals.yaml
  x-major-version: v1
servers:
  - url: https://api.tyntec.com/network-signal/v1
tags:
  - name: "SIM Swap"
    description: |
      SIM swap services allow you to check if a SIM card has been swapped recently and retrieve the date of the latest SIM change.
  - name: "Device Swap"
    description: |
      Device swap services allow you to check if a device has been swapped recently and retrieve the date of the latest device change.
  - name: "Call Forwarding"
    description: |
      Call forwarding service allows you to check if unconditional call forwarding is currently active for a phone number.

paths:
  /sim-swap/check:
    post:
      tags:
        - "SIM Swap"
      summary: Check SIM swap
      description: |
        Check if a SIM card has been swapped within a specified time period.
        
        This endpoint allows you to verify if the SIM card associated with a phone number has been changed 
        within the last maxAge minutes (default: 240 minutes, maximum: 2400 minutes).
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimSwapCheckRequest'
      responses:
        200:
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimSwapResponse'
        400:
          description: Bad Request - Invalid argument
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/BadRequestError'
        401:
          description: Unauthorized - Missing, invalid, or expired credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        403:
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionDeniedError'
        404:
          description: Not Found - Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        500:
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
  /sim-swap/retrieve-date:
    post:
      tags:
        - "SIM Swap"
      summary: Retrieve SIM swap date
      description: |
        Retrieve the date of the latest SIM card change for a phone number.
        
        This endpoint returns the timestamp of the most recent SIM swap, or null if no SIM swap has been detected.
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneNumberRequest'
      responses:
        200:
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LatestSimChangeResponse'
        400:
          description: Bad Request - Invalid argument
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        401:
          description: Unauthorized - Missing, invalid, or expired credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        403:
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionDeniedError'
        404:
          description: Not Found - Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        500:
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
  /device-swap/check:
    post:
      tags:
        - "Device Swap"
      summary: Check device swap
      description: |
        Check if a device has been swapped within a specified time period.
        
        This endpoint allows you to verify if the device associated with a phone number has been changed 
        within the last maxAge minutes (default: 240 minutes, maximum: 2400 minutes).
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceSwapCheckRequest'
      responses:
        200:
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceSwapResponse'
        400:
          description: Bad Request - Invalid argument
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/BadRequestError'
        401:
          description: Unauthorized - Missing, invalid, or expired credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        403:
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionDeniedError'
        404:
          description: Not Found - Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        500:
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
  /device-swap/retrieve-date:
    post:
      tags:
        - "Device Swap"
      summary: Retrieve device swap date
      description: |
        Retrieve the date of the latest device change for a phone number.
        
        This endpoint returns the timestamp of the most recent device swap, or null if no device swap has been detected.
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneNumberRequest'
      responses:
        200:
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LatestDeviceChangeResponse'
        400:
          description: Bad Request - Invalid argument
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        401:
          description: Unauthorized - Missing, invalid, or expired credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        403:
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionDeniedError'
        404:
          description: Not Found - Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        500:
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
  /call-forwarding/unconditional/check:
    post:
      tags:
        - "Call Forwarding"
      summary: Check call forwarding status
      description: |
        Check if unconditional call forwarding is currently active for a phone number.
        
        This endpoint verifies whether the specified phone number has call forwarding enabled.
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneNumberRequest'
      responses:
        200:
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallForwardingResponse'
        400:
          description: Bad Request - Invalid argument
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/BadRequestError'
        401:
          description: Unauthorized - Missing, invalid, or expired credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        403:
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionDeniedError'
        404:
          description: Not Found - Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        500:
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
components:
  schemas:
    PhoneNumberRequest:
      type: object
      required:
        - phoneNumber
      properties:
        phoneNumber:
          type: string
          description: Phone number in the international format with or without the leading “+” or “00” prefix
          example: "+491234567890"
    SimSwapCheckRequest:
      type: object
      required:
        - phoneNumber
      properties:
        phoneNumber:
          type: string
          description: Phone number in the international format with or without the leading “+” or “00” prefix
          example: "+491234567890"
        maxAge:
          type: integer
          description: Time counted in minutes
          minimum: 1
          maximum: 2400
          default: 240
          example: 120
    DeviceSwapCheckRequest:
      type: object
      required:
        - phoneNumber
      properties:
        phoneNumber:
          type: string
          description: Phone number in the international format with or without the leading “+” or “00” prefix
          example: "+491234567890"
        maxAge:
          type: integer
          description: Time counted in minutes
          minimum: 1
          maximum: 2400
          default: 240
          example: 120
    SimSwapResponse:
      type: object
      properties:
        swapped:
          type: boolean
          description: Indicates whether a SIM swap has occurred within the specified time period
          example: true
    DeviceSwapResponse:
      type: object
      properties:
        swapped:
          type: boolean
          description: Indicates whether a device swap has occurred within the specified time period
          example: true
    LatestSimChangeResponse:
      type: object
      properties:
        latestSimChange:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the latest SIM change in ISO 8601 format, or null if no change detected
          example: "2024-09-18T07:37:53.471829447Z"
    LatestDeviceChangeResponse:
      type: object
      properties:
        latestDeviceChange:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the latest device change in ISO 8601 format, or null if no change detected
          example: "2024-09-18T07:37:53.471829447Z"
    CallForwardingResponse:
      type: object
      properties:
        active:
          type: boolean
          description: Indicates whether unconditional call forwarding is currently active
          example: true
    BadRequestError:
      type: object
      required:
        - message
      properties:
        status:
          type: integer
          example: 400
          description: HTTP status code
        code:
          type: string
          example: "INVALID_ARGUMENT"
          description: Error code
        message:
          type: string
          example: "Client specified an invalid argument, request body or query param."
          description: Error message
    UnauthorizedError:
      type: object
      required:
        - message
      properties:
        status:
          type: integer
          example: 401
          description: HTTP status code
        code:
          type: string
          example: "UNAUTHENTICATED"
          description: Error code
        message:
          type: string
          example: "Request not authenticated due to missing, invalid, or expired credentials. A new authentication is required."
          description: Error message
    PermissionDeniedError:
      type: object
      required:
        - message
      properties:
        status:
          type: integer
          example: 403
          description: HTTP status code
        code:
          type: string
          example: "PERMISSION_DENIED"
          description: Error code
        message:
          type: string
          example: "Client does not have sufficient permissions to perform this action."
          description: Error message
    NotFoundError:
      type: object
      required:
        - message
      properties:
        status:
          type: integer
          example: 404
          description: HTTP status code
        code:
          type: string
          example: "NOT_FOUND"
          description: Error code
        message:
          type: string
          example: "The specified resource is not found."
          description: Error message
    InternalServerError:
      type: object
      required:
        - message
      properties:
        status:
          type: integer
          example: 500
          description: HTTP status code
        code:
          type: string
          example: "INTERNAL_SERVER_ERROR"
          description: Error code
        message:
          type: string
          example: "Request could not be processed"
          description: Error message
  securitySchemes:
    apiKey:
      type: apiKey
      name: apiKey
      in: header
      description: API authentication key for the customer account
